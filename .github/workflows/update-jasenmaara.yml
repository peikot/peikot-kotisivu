name: Päivitä config.json

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 5 * * *' # joka päivä klo 08:00 Suomen aikaa (UTC+3)

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hae jäsenmäärä Apps Scriptistä
        id: jasenmaara
        run: |
          URL=$(jq -r '.appsScriptUrl' config.json)
          MAARA=$(curl -sL "$URL" | jq -r '.jasenmaara')
          if [[ "$MAARA" =~ ^[0-9]+$ ]]; then
            echo "maara=$MAARA" >> $GITHUB_OUTPUT
          else
            echo "::warning::Virheellinen jäsenmäärä: $MAARA"
            echo "maara=" >> $GITHUB_OUTPUT
          fi

      - name: Hae seuraava peli ja höntsymittari
        id: kalenteri
        run: |
          URL=$(jq -r '.kalenteriUrl' config.json)
          DATA=$(curl -sL "$URL")

          # Tarkista JSON-validius
          if ! echo "$DATA" | jq -e '.seuraava' > /dev/null 2>&1; then
            echo "::warning::Kalenteridata ei saatavilla"
            echo "ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "ok=true" >> $GITHUB_OUTPUT

          # Tallenna raakadata tiedostoihin jq-käsittelyä varten
          echo "$DATA" > /tmp/kalenteri.json

      - name: Hae ilmoittautumiskategoriat
        id: ilmo
        run: |
          URL=$(jq -r '.ilmoittautumisUrl' config.json)
          DATA=$(curl -sL "${URL}?action=kategoriat")

          if ! echo "$DATA" | jq -e '.kategoriat' > /dev/null 2>&1; then
            echo "::warning::Ilmoittautumisdata ei saatavilla"
            echo "ok=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "ok=true" >> $GITHUB_OUTPUT
          echo "$DATA" > /tmp/ilmo.json

      - name: Päivitä config.json
        run: |
          tmp=$(mktemp)
          cp config.json "$tmp"

          # 1. Jäsenmäärä
          MAARA="${{ steps.jasenmaara.outputs.maara }}"
          if [ -n "$MAARA" ]; then
            jq --argjson m "$MAARA" '.jasenmaara = $m' "$tmp" > "${tmp}.new" && mv "${tmp}.new" "$tmp"
          fi

          # 2. Seuraava peli + höntsymittari
          if [ "${{ steps.kalenteri.outputs.ok }}" = "true" ]; then
            # seuraavaPeli: poimi vain config.jsonin kentät (otsikko, alkaa, paikka, laji, emoji)
            SEURAAVA=$(jq '.seuraava | {otsikko, alkaa, paikka, laji, emoji}' /tmp/kalenteri.json)
            if [ "$(echo "$SEURAAVA" | jq '.otsikko')" != "null" ]; then
              jq --argjson s "$SEURAAVA" '.seuraavaPeli = $s' "$tmp" > "${tmp}.new" && mv "${tmp}.new" "$tmp"
            fi

            # höntsymittari: poimi pelit, tunnit, tavoite
            MITTARI=$(jq '.mittari | {pelit, tunnit, tavoite}' /tmp/kalenteri.json)
            if [ "$(echo "$MITTARI" | jq '.pelit')" != "null" ]; then
              jq --argjson m "$MITTARI" '.hontsymittari = $m' "$tmp" > "${tmp}.new" && mv "${tmp}.new" "$tmp"
            fi
          fi

          # 3. Ilmoittautumiskategoriat
          if [ "${{ steps.ilmo.outputs.ok }}" = "true" ]; then
            KATEGORIAT=$(jq '.kategoriat' /tmp/ilmo.json)
            jq --argjson k "$KATEGORIAT" '.ilmoittautumisKategoriat = $k' "$tmp" > "${tmp}.new" && mv "${tmp}.new" "$tmp"
          fi

          mv "$tmp" config.json

      - name: Päivitä index.html
        run: |
          MAARA="${{ steps.jasenmaara.outputs.maara }}"
          if [ -n "$MAARA" ]; then
            sed -i "s/data-maara=\"[0-9]*\"/data-maara=\"$MAARA\"/g" index.html
          fi

      - name: Commitoi muutokset jos tarpeen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || (
            git add index.html config.json &&
            git commit -m "Päivitä config.json (automaattinen)"
          )

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
