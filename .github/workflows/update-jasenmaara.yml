name: Päivitä jäsenmäärä

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Hae jäsenmäärä Apps Scriptistä
        id: fetch
        run: |
          URL=$(jq -r '.appsScriptUrl' config.json)
          MAARA=$(curl -sL "$URL" | jq -r '.jasenmaara')
          if [[ "$MAARA" =~ ^[0-9]+$ ]]; then
            echo "maara=$MAARA" >> $GITHUB_OUTPUT
          else
            echo "Virheellinen jäsenmäärä: $MAARA" && exit 1
          fi

      - name: Päivitä index.html ja config.json
        run: |
          MAARA=${{ steps.fetch.outputs.maara }}
          sed -i "s/data-maara=\"[0-9]*\"/data-maara=\"$MAARA\"/g" index.html
          # Päivitä vain jasenmaara-kenttä, säilytä muu fallback-data
          tmp=$(mktemp)
          jq --argjson m "$MAARA" '.jasenmaara = $m' config.json > "$tmp" && mv "$tmp" config.json

      - name: Commitoi muutokset jos tarpeen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || (
            git add index.html config.json &&
            git commit -m "Päivitä jäsenmäärä: ${{ steps.fetch.outputs.maara }}"
          )

      - name: Push
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
